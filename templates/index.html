<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Clicker 🌌 Online</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.4/socket.io.min.js"></script>
</head>
<body>

    <!-- ==================== -->
    <!-- ВІКНО 1: СТАРТОВИЙ ЕКРАН -->
    <!-- ==================== -->
    <div id="start-screen">
        <h1>Welcome to Cosmic Clicker! 🌌</h1>

        <label>Enter your nickname:</label>
        <p class="hint">(English letters only, max 15 characters)</p>
        <input type="text" id="nickname-input" maxlength="15" placeholder="Your name...">
        <p id="error-msg"></p>

        <div class="avatar-section">
            <h2>Choose your avatar:</h2>
            <div class="avatar-container" id="avatar-container"></div>
        </div>

        <div class="buttons-row">
            <button class="btn-confirm" onclick="confirmNickname()">Confirm</button>
            <button class="btn-exit" onclick="window.close()">Exit</button>
        </div>
    </div>

    <!-- ==================== -->
    <!-- ВІКНО 2: ІГРОВИЙ ЕКРАН -->
    <!-- ==================== -->
    <div id="game-screen">
        <canvas id="game-canvas"></canvas>

        <!-- Профіль гравця -->
        <div id="player-info">
            <span class="avatar" id="game-avatar">👽</span>
            <span class="name" id="game-name">Player</span>
        </div>

        <!-- HUD -->
        <div id="hud">
            <div class="high-score" id="high-score-label">Your High Score: 0</div>
            <div class="score" id="score-label">Score: 0</div>
            <div class="game-buttons">
                <button class="btn-game btn-start" id="action-btn" onclick="startGame()">Start</button>
                <button class="btn-game btn-game-exit" onclick="window.close()">Exit</button>
            </div>
        </div>

        <!-- Таблиця лідерів -->
        <div id="leaderboard">
            <h3>🏆 Leaderboard</h3>
            <div id="leaderboard-list"></div>
        </div>

        <!-- Інструкція -->
        <div id="instructions">⭐ Left-click on a star to catch it! ⭐</div>

        <!-- Повідомлення про рекорд -->
        <div id="record-alarm">🚨 NEW RECORD! 🚨</div>

        <!-- Онлайн статус -->
        <div id="online-status">
            <span class="status-dot"></span> Connected to server
        </div>
    </div>

    <!-- ==================== -->
    <!-- JAVASCRIPT -->
    <!-- ==================== -->
    <script>
        // -------------------
        // Підключення до сервера
        // -------------------
        const socket = io();

        // -------------------
        // Змінні гри
        // -------------------
        let playerName = "";
        let playerAvatar = "👽";
        let selectedAvatar = "👽";
        let score = 0;
        let highScore = 0;
        let gameRunning = false;
        let stars = [];
        const avatars = ['👽', '🚀', '👨‍🚀', '👾', '🤖', '🛸', '☄️', '🌟', '🌙'];

        // -------------------
        // Canvas
        // -------------------
        const canvas = document.getElementById("game-canvas");
        const ctx = canvas.getContext("2d");

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener("resize", resizeCanvas);

        // -------------------
        // Аватари
        // -------------------
        const avatarContainer = document.getElementById("avatar-container");
        avatars.forEach((av, index) => {
            const btn = document.createElement("button");
            btn.className = "avatar-btn" + (index === 0 ? " selected" : "");
            btn.textContent = av;
            btn.onclick = () => selectAvatar(av, btn);
            avatarContainer.appendChild(btn);
        });

        function selectAvatar(av, btn) {
            selectedAvatar = av;
            document.querySelectorAll(".avatar-btn").forEach(b => b.classList.remove("selected"));
            btn.classList.add("selected");
        }

        // -------------------
        // Підтвердження нікнейму
        // -------------------
        function confirmNickname() {
            const input = document.getElementById("nickname-input").value.trim();
            const errorMsg = document.getElementById("error-msg");

            if (!input || input.length > 15 || !/^[A-Za-z0-9 ]+$/.test(input)) {
                errorMsg.textContent = "Please reread the username entry conditions and try again.";
                return;
            }

            errorMsg.textContent = "";
            playerName = input;
            playerAvatar = selectedAvatar;

            socket.emit("player_join", { name: playerName, avatar: playerAvatar });

            document.getElementById("start-screen").style.display = "none";
            document.getElementById("game-screen").style.display = "block";
            document.getElementById("game-avatar").textContent = playerAvatar;
            document.getElementById("game-name").textContent = playerName;

            resizeCanvas();
            renderLoop();
        }

        // -------------------
        // Керування грою
        // -------------------
        function startGame() {
            gameRunning = true;
            score = 0;
            updateHUD();
            const btn = document.getElementById("action-btn");
            btn.textContent = "Stop game";
            btn.className = "btn-game btn-stop";
            btn.onclick = stopGame;
        }

        function stopGame() {
            gameRunning = false;
            const btn = document.getElementById("action-btn");
            btn.textContent = "Start again";
            btn.className = "btn-game btn-start";
            btn.onclick = restartGame;
        }

        function restartGame() {
            score = 0;
            socket.emit("reset_score", { player_name: playerName });
            updateHUD();
            startGame();
        }

        function updateHUD() {
            document.getElementById("score-label").textContent = `Score: ${score}`;
            document.getElementById("high-score-label").textContent = `Your High Score: ${highScore}`;
        }

        // -------------------
        // Таблиця лідерів
        // -------------------
        function updateLeaderboard(leaderboard) {
            const list = document.getElementById("leaderboard-list");
            list.innerHTML = "";
            leaderboard.forEach((player, index) => {
                const entry = document.createElement("div");
                entry.className = "leaderboard-entry";
                entry.innerHTML = `
                    <span class="rank">${index + 1}.</span>
                    <span class="lb-avatar">${player.avatar}</span>
                    <span class="lb-name">${player.name}</span>
                    <span class="lb-score">${player.high_score}</span>
                `;
                list.appendChild(entry);
            });
        }

        // -------------------
        // Малювання
        // -------------------
        function renderLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (const star of stars) {
                ctx.beginPath();
                ctx.arc(star.x + star.size / 2, star.y + star.size / 2, star.size / 2, 0, Math.PI * 2);
                ctx.fillStyle = star.color;
                ctx.fill();
                ctx.closePath();
            }

            requestAnimationFrame(renderLoop);
        }

        // -------------------
        // Клік по Canvas
        // -------------------
        canvas.addEventListener("click", (event) => {
            if (!gameRunning) return;

            const rect = canvas.getBoundingClientRect();
            const clickX = event.clientX - rect.left;
            const clickY = event.clientY - rect.top;

            for (const star of stars) {
                const centerX = star.x + star.size / 2;
                const centerY = star.y + star.size / 2;
                const distance = Math.sqrt((clickX - centerX) ** 2 + (clickY - centerY) ** 2);

                if (distance <= star.size / 2) {
                    socket.emit("catch_star", {
                        star_id: star.id,
                        player_name: playerName
                    });
                    break;
                }
            }
        });

        // Курсор
        canvas.addEventListener("mousemove", (event) => {
            if (!gameRunning) {
                canvas.style.cursor = "default";
                return;
            }

            const rect = canvas.getBoundingClientRect();
            const mouseX = event.clientX - rect.left;
            const mouseY = event.clientY - rect.top;

            let onStar = false;
            for (const star of stars) {
                const centerX = star.x + star.size / 2;
                const centerY = star.y + star.size / 2;
                const distance = Math.sqrt((mouseX - centerX) ** 2 + (mouseY - centerY) ** 2);
                if (distance <= star.size / 2) {
                    onStar = true;
                    break;
                }
            }
            canvas.style.cursor = onStar ? "crosshair" : "default";
        });

        // -------------------
        // WebSocket події
        // -------------------
        socket.on("game_state", (data) => {
            stars = data.stars;
            updateLeaderboard(data.leaderboard);
        });

        socket.on("player_data", (data) => {
            highScore = data.high_score;
            updateHUD();
            updateLeaderboard(data.leaderboard);
        });

        socket.on("new_star", (star) => {
            stars.push(star);
        });

        socket.on("update_stars", (updatedStars) => {
            stars = updatedStars;
        });

        socket.on("remove_star", (data) => {
            stars = stars.filter(s => s.id !== data.id);
        });

        socket.on("star_removed", (data) => {
            stars = stars.filter(s => s.id !== data.star_id);
        });

        socket.on("star_caught_success", (data) => {
            stars = stars.filter(s => s.id !== data.star_id);
            score = data.score;
            highScore = data.high_score;
            updateHUD();

            if (data.new_record) {
                showRecordAlarm();
            }
        });

        socket.on("star_already_caught", (data) => {
            stars = stars.filter(s => s.id !== data.star_id);
        });

        socket.on("score_reset", (data) => {
            score = data.score;
            highScore = data.high_score;
            updateHUD();
        });

        socket.on("leaderboard_update", (leaderboard) => {
            updateLeaderboard(leaderboard);
        });

        // -------------------
        // Рекорд
        // -------------------
        function showRecordAlarm() {
            const alarm = document.getElementById("record-alarm");
            alarm.textContent = `🚨 NEW RECORD, ${playerName}! 🚨`;
            alarm.style.display = "block";
            setTimeout(() => {
                alarm.style.display = "none";
            }, 3000);
        }
    </script>
</body>
</html>
